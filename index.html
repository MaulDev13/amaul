<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>Maul Dev</title>

        <link rel="icon" href="assets/favicon.ico">
        <link rel="icon" type="image/png" sizes="32x32" href="assets/favicon-32x32.png">
        <link rel="icon" type="image/png" sizes="16x16" href="assets/favicon-16x16.png">

        <meta name="api-base" content="https://simple-go-production.up.railway.app">
        <link rel="stylesheet" href="css/style.css">
        <script src="https://cdn.tailwindcss.com"></script>
        <script src="https://unpkg.com/htmx.org@1.9.12"></script>
        
    </head>
    <body class="bg-gray-100 text-gray-800 m-0 p-0 min-h-screen flex flex-col">
        <div class="max-w-3xl mx-auto px-4">
        
            <div class="bg-white p-4 rounded-xl shadow mb-6 sticky top-0 z-50"
                hx-get="/components/navbar.html"
                hx-trigger="load"
                hx-swap="innerHTML">
            </div>

            <div>
                <div id="loading" class="hidden text-center p-4 text-sm text-gray-500">
                    Loading...
                </div>
                <div id="content"
                    hx-get="/pages/home.html"
                    hx-trigger="load"
                    hx-swap="innerHTML">
                </div>
            </div>

            <p class="text-xs text-gray-500 mt-6 text-center">
                Architecture: HTMX + Go API
            </p>

        </div>
        <script src="js/config.js"></script>
        <script src="js/script.js"></script>
        <script>
            const API_BASE = document
                .querySelector('meta[name="api-base"]')
                .getAttribute("content");

            const BASE_PATH = location.hostname === "localhost" ||
                            location.hostname === "127.0.0.1"
                ? ""
                : "";

            document.body.addEventListener("htmx:configRequest", function (event) {
                let path = event.detail.path;

                // 1. kalau API → arahkan ke backend
                if (path.startsWith("/api")) {
                    event.detail.path = API_BASE + path;
                    return;
                }

                // 2. kalau bukan http → tambahkan base path
                if (!path.startsWith("http")) {
                    event.detail.path = BASE_PATH + path;
                }
            });

            function setActive(button) {
                document.querySelectorAll(".nav-btn").forEach(btn => {
                    btn.classList.remove("text-blue-600", "border-blue-600");
                    btn.classList.add("border-transparent");
                });

                button.classList.add("text-blue-600", "border-blue-600");
                button.classList.remove("border-transparent");
            }

            // attach after click
            document.body.addEventListener("click", function(e) {
                if (e.target.classList.contains("nav-btn")) {
                    setActive(e.target);
                }
            })
        </script>
    </body>
</html>
