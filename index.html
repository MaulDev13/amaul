<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>Maul Dev</title>
    
        <div id="loading" class="hidden text-center p-4 text-sm text-gray-500">
            Loading...
        </div>

        <link rel="icon" href="assets/favicon.ico">
        <link rel="icon" type="image/png" sizes="32x32" href="assets/favicon-32x32.png">
        <link rel="icon" type="image/png" sizes="16x16" href="assets/favicon-16x16.png">

        <meta name="api-base" content="https://simple-go-production.up.railway.app">
        <link rel="stylesheet" href="css/style.css">
        <script src="https://cdn.tailwindcss.com"></script>
        <script src="https://unpkg.com/htmx.org@1.9.12"></script>
        
    </head>
    <body class="bg-gray-100 text-gray-800">        
        <div class="bg-white p-6 rounded-xl shadow mb-6 sticky top-0 z-50"
            hx-get="/components/navbar.html"
            hx-trigger="load"
            hx-swap="innerHTML">
        </div>
        <div id="content"
            hx-get="/pages/home.html"
            hx-trigger="load"
            hx-swap="innerHTML">
        </div>

        <p class="text-xs text-gray-500 mt-2">
            Architecture: HTMX (frontend) + Go API (backend)
        </p>
        <script src="js/config.js"></script>
        <script src="js/script.js"></script>
        <script>
            const API_BASE = document
                .querySelector('meta[name="api-base"]')
                .getAttribute("content");

            const BASE_PATH = location.hostname === "localhost" ||
                            location.hostname === "127.0.0.1"
                ? ""
                : "";

            document.body.addEventListener("htmx:configRequest", function (event) {
                let path = event.detail.path;

                // 1. kalau API → arahkan ke backend
                if (path.startsWith("/api")) {
                    event.detail.path = API_BASE + path;
                    return;
                }

                // 2. kalau bukan http → tambahkan base path
                if (!path.startsWith("http")) {
                    event.detail.path = BASE_PATH + path;
                }
            });

            document.body.addEventListener("htmx:beforeRequest", () => {
                document.getElementById("loading").classList.remove("hidden");
            });

            document.body.addEventListener("htmx:afterRequest", () => {
                document.getElementById("loading").classList.add("hidden");
            });
        </script>
    </body>
</html>
