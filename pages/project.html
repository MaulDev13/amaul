    <h1 class="text-3xl font-bold mb-4">Projects</h1>

    <p class="text-gray-600">
        Here are some of the things I’ve built and experimented with. Most of these 
        projects are part of my learning process—trying out ideas, improving my skills, 
        and understanding how systems work in practice.

<!-- Game -->
<div class="bg-white p-6 rounded-xl shadow mb-6 hover:shadow-lg transition">
    <button
        class="flex justify-between items-center w-full text-xl font-semibold mb-4"
        hx-get="/pages/contents/game-content.html"
        hx-target="#game-content"
        hx-trigger="click once"
        hx-swap="innerHTML"
        onclick="toggleSection(this)"
    >
        <span>🎮 Game Development</span>

        <span class="arrow transition-transform duration-300">
            ▼
        </span>
    </button>

    <div id="game-content" class="hidden"></div>
</div>

<script>
function toggleSection(button) {
    const content = button.nextElementSibling;
    const arrow = button.querySelector(".arrow");

    const isOpening = content.classList.contains("hidden");

    content.classList.toggle("hidden");
    arrow.classList.toggle("rotate-180", isOpening);
}
</script>
